name: AI Daily News

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install openai feedparser requests

      - name: Generate report
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
        run: python scripts/collect_news.py

      - name: Commit
        run: |
          git config user.email "bot@github.com"
          git config user.name "AI Bot"
          git add BACKUP/
          git diff --staged --quiet || git commit -m "Daily AI report $(date '+%Y-%m-%d')"
          git push

      - name: Send to Feishu
        run: |
          TODAY=$(date '+%Y-%m-%d')
          CONTENT=$(head -c 800 "BACKUP/${TODAY}.md" | sed 's/"/\\"/g' | tr '\n' ' ')
          curl -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"📰 AI早报 ${TODAY}\n\n${CONTENT}\n\n完整版：https://github.com/qilizhi-beep/ai-daily-bot/tree/main/BACKUP\"}}"
